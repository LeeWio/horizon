file:
  upload-dir: uploads

spring:
  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/horizon_blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useAffectedRows=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:G7v!p9Xq$2RfL8kM}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

  # Redis 配置（可选，用于限流）
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  jpa:
    hibernate:
      ddl-auto: create-drop      # 自动建表或更新表结构
    show-sql: true
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# 日志配置
logging:
  level:
    root: INFO
    org.springframework: INFO
    com.sunrizon.horizon: DEBUG

# OpenAPI / Swagger 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# JWT 配置
jwt:
  secret: daf66e01593f61a15b857cf433aae03a005812b31234e149036bcc8dee755dbb
  expiration-hours: 24

# CORS 配置
cors:
  allowed-origins: http://localhost:3000,http://localhost:8080
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# 限流配置
rate-limit:
  enabled: false  # 暂时禁用限流，避免 Redis 依赖
  requests-per-minute: 100
  burst-capacity: 200